<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MikizGame — le hub de jeux du jour</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Hanken+Grotesk:wght@400;500;600;700&family=Quicksand:wght@500;600;700&family=Nunito:wght@500;600;700;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg: oklch(0.975 0.012 85);
  --bg-2: oklch(0.945 0.016 84);
  --card: oklch(0.995 0.004 85);
  --card-2: oklch(0.965 0.012 84);
  --line: oklch(0.885 0.014 80);
  --line-soft: oklch(0.925 0.011 80);
  --text: oklch(0.30 0.022 60);
  --text-dim: oklch(0.48 0.020 62);
  --text-mute: oklch(0.62 0.018 64);
  --accent: oklch(0.70 0.17 45);
  --shadow-soft: 0 2px 4px oklch(0.5 0.03 60 / 0.05), 0 10px 24px oklch(0.5 0.03 60 / 0.07);
  --shadow-lift: 0 6px 12px oklch(0.5 0.03 60 / 0.08), 0 18px 40px oklch(0.5 0.03 60 / 0.12);
  --font-display: "Baloo 2", sans-serif;
  --font-body: "Hanken Grotesk", system-ui, sans-serif;
  --font-mono: "Hanken Grotesk", system-ui, sans-serif;
  --font-num: "Hanken Grotesk", system-ui, sans-serif;
  --radius: 16px;
  --maxw: 1180px;
}
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ background:var(--bg); color:var(--text); font-family:var(--font-body); -webkit-font-smoothing:antialiased; }
body{ line-height:1.5; }
button{ font-family:inherit; cursor:pointer; color:inherit; }
::selection{ background:color-mix(in oklch, var(--accent) 40%, transparent); }
.app-root{ min-height:100vh; display:flex; flex-direction:column; }
.app-main{ flex:1; }
.page{ max-width:var(--maxw); margin:0 auto; padding:0 28px; }

/* ---------- header ---------- */
.app-header{ position:sticky; top:0; z-index:40; background:color-mix(in oklch, var(--bg) 88%, white); backdrop-filter:blur(8px); border-bottom:1px solid var(--line-soft); }
.header-inner{ max-width:var(--maxw); margin:0 auto; padding:0 28px; height:72px; display:flex; align-items:center; gap:32px; }
.logo{ background:none; border:none; display:flex; align-items:center; gap:11px; padding:0; }
.logo-mark{ display:flex; gap:3px; }
.logo-dot{ width:9px; height:9px; border-radius:50%; }
.logo-word{ font-family:var(--font-display); font-weight:700; font-size:20px; letter-spacing:-0.02em; }
.logo-word-accent{ color:var(--accent); }
.nav{ display:flex; gap:4px; }
.nav-link{ background:none; border:none; padding:9px 15px; border-radius:99px; font-size:15px; font-weight:500; color:var(--text-dim); transition:.15s; }
.nav-link:hover{ color:var(--text); background:var(--bg-2); }
.nav-link.active{ color:var(--text); background:var(--card); box-shadow:var(--shadow-soft); }
.header-right{ margin-left:auto; display:flex; align-items:center; gap:14px; }
.streak-chip{ display:flex; align-items:center; gap:5px; background:var(--card); border:1px solid var(--line-soft); padding:6px 12px; border-radius:99px; box-shadow:var(--shadow-soft); }
.streak-flame{ font-size:14px; }
.streak-num{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; font-size:14px; }
.avatar-btn{ background:none; border:none; padding:0; border-radius:50%; }
.avatar{ display:inline-flex; align-items:center; justify-content:center; border-radius:50%; font-family:var(--font-display); font-weight:700; }

/* ---------- buttons ---------- */
.btn{ border:none; border-radius:99px; font-weight:600; display:inline-flex; align-items:center; gap:8px; justify-content:center; transition:.16s; white-space:nowrap; }
.btn-sm{ padding:8px 14px; font-size:13.5px; }
.btn-md{ padding:11px 20px; font-size:15px; }
.btn-lg{ padding:14px 26px; font-size:16px; }
.btn-full{ width:100%; }
.btn-primary{ background:var(--btn-accent, var(--accent)); color:white; box-shadow:0 2px 0 color-mix(in oklch, var(--btn-accent, var(--accent)) 60%, black), 0 6px 16px color-mix(in oklch, var(--btn-accent, var(--accent)) 34%, transparent); }
.btn-primary:hover{ filter:brightness(1.05); transform:translateY(-1px); }
.btn-primary:active{ transform:translateY(1px); box-shadow:0 1px 0 color-mix(in oklch, var(--btn-accent, var(--accent)) 60%, black); }
.btn-ghost{ background:var(--card); color:var(--text-dim); box-shadow:inset 0 0 0 1px var(--line); }
.btn-ghost:hover{ color:var(--text); background:var(--bg-2); }
.btn:disabled{ opacity:.45; cursor:not-allowed; transform:none; filter:none; }
.arr{ transition:.16s; }
.btn:hover .arr{ transform:translateX(3px); }

/* ---------- pills ---------- */
.pill{ display:inline-flex; align-items:center; gap:5px; font-size:12px; font-weight:600; padding:4px 10px; border-radius:99px; border:1px solid var(--line); color:var(--text-dim); letter-spacing:.01em; white-space:nowrap; }
.pill-live{ color:oklch(0.8 0.15 150); background:color-mix(in oklch, oklch(0.74 0.16 150) 14%, transparent); border-color:color-mix(in oklch,oklch(0.74 0.16 150) 30%, transparent); }
.pill-soon{ color:var(--text-mute); }
.pill-done{ color:oklch(0.82 0.13 150); background:color-mix(in oklch, oklch(0.74 0.16 150) 12%, transparent); border-color:color-mix(in oklch,oklch(0.74 0.16 150) 26%, transparent); }

/* ---------- section heads ---------- */
.section{ padding:46px 0; }
.section-head{ display:flex; align-items:flex-end; justify-content:space-between; margin-bottom:24px; }
.section-kicker{ font-family:var(--font-body); font-weight:700; font-size:13px; letter-spacing:.02em; color:var(--accent); margin-bottom:6px; }
.section-head>div:first-child{ min-width:0; }
.section-title{ font-family:var(--font-display); font-size:31px; font-weight:700; letter-spacing:-0.01em; white-space:nowrap; }
.section-meta{ font-size:14px; color:var(--text-mute); white-space:nowrap; flex-shrink:0; padding-left:16px; }

/* ---------- game glyph ---------- */
.game-glyph{ display:inline-flex; align-items:center; justify-content:center; border-radius:calc(var(--radius) - 2px); flex-shrink:0; }

/* ---------- hero ---------- */
.hero{ position:relative; max-width:var(--maxw); margin:0 auto; padding:54px 28px 16px; overflow:hidden; }
.hero-glow{ position:absolute; top:-180px; right:-120px; width:600px; height:600px; border-radius:50%; background:radial-gradient(circle, color-mix(in oklch, var(--accent) 18%, transparent), transparent 66%); pointer-events:none; z-index:0; }
.hero-content{ position:relative; z-index:1; display:grid; grid-template-columns:1.15fr 0.85fr; gap:48px; align-items:center; }
.hero-title{ font-family:var(--font-display); font-size:54px; line-height:1.04; font-weight:800; letter-spacing:-0.02em; margin:18px 0 16px; }
.hero-sub{ font-size:18px; color:var(--text-dim); max-width:30em; }
.hero-cta{ display:flex; gap:12px; margin-top:28px; flex-wrap:wrap; }
.hero-card{ background:var(--card); border:1px solid var(--line); border-radius:calc(var(--radius) + 6px); padding:24px; box-shadow:var(--shadow-lift); }
.hero-card-top{ display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.hero-card-name{ font-family:var(--font-display); font-weight:700; font-size:19px; }
.hero-card-cat{ font-size:13px; color:var(--text-mute); }
.hero-card-blurb{ font-size:14.5px; color:var(--text-dim); margin-bottom:18px; }
.hero-thermo{ position:relative; height:10px; border-radius:99px; background:linear-gradient(90deg, oklch(0.55 0.16 250), oklch(0.84 0.14 120), oklch(0.66 0.21 30)); margin-bottom:6px; }
.hero-thermo-label{ font-family:var(--font-body); font-weight:600; font-size:11px; color:var(--text-mute); text-transform:uppercase; letter-spacing:.04em; }
.hero-thermo-label.hot{ float:right; color:oklch(0.7 0.18 35); }
.hero-card-stats{ display:flex; gap:26px; margin-top:18px; padding-top:16px; border-top:1px solid var(--line-soft); }
.hero-card-stats b{ font-family:var(--font-display); font-size:23px; display:block; }
.hero-card-stats span{ font-size:12.5px; color:var(--text-mute); }
.hero-card-done{ margin-top:14px; font-size:13.5px; color:oklch(0.82 0.13 150); font-weight:600; }

/* ---------- game grid ---------- */
.game-grid{ display:grid; grid-template-columns:repeat(3, 1fr); gap:18px; }
.game-card{ position:relative; text-align:left; background:var(--card); border:1px solid var(--line-soft); border-radius:calc(var(--radius) + 4px); padding:22px; display:flex; flex-direction:column; gap:16px; min-height:200px; transition:.18s; overflow:hidden; box-shadow:var(--shadow-soft); }
.game-card:not(.is-soon):hover{ transform:translateY(-4px); border-color:color-mix(in oklch, var(--g) 45%, var(--line)); box-shadow:var(--shadow-lift); }
.game-card-sheen{ position:absolute; inset:0; background:radial-gradient(120% 80% at 100% 0%, color-mix(in oklch, var(--g) 12%, transparent), transparent 60%); opacity:0; transition:.18s; pointer-events:none; }
.game-card:not(.is-soon):hover .game-card-sheen{ opacity:1; }
.game-card.is-soon{ opacity:.62; cursor:default; }
.game-card-head{ display:flex; align-items:flex-start; justify-content:space-between; position:relative; z-index:1; }
.game-card-body{ position:relative; z-index:1; }
.game-card-name{ font-family:var(--font-display); font-size:22px; font-weight:700; letter-spacing:-0.02em; }
.game-card-tag{ font-size:14px; color:var(--text-dim); margin-top:4px; }
.game-card-foot{ margin-top:auto; display:flex; justify-content:space-between; align-items:center; position:relative; z-index:1; padding-top:6px; }
.game-card-cat{ font-family:var(--font-body); font-weight:600; font-size:11.5px; letter-spacing:.02em; text-transform:uppercase; color:var(--text-mute); }
.game-card-players{ font-size:12.5px; color:var(--text-mute); }

/* ---------- split section (mini lb + streak) ---------- */
.section-split{ display:grid; grid-template-columns:1.3fr 0.7fr; gap:18px; align-items:start; }
.mini-lb,.streak-panel{ background:var(--card); border:1px solid var(--line-soft); border-radius:calc(var(--radius)+4px); padding:22px; box-shadow:var(--shadow-soft); }
.mini-lb-head{ display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px; }
.mini-lb-title{ font-family:var(--font-display); font-size:20px; font-weight:700; }
.mini-lb-list{ list-style:none; display:flex; flex-direction:column; gap:2px; }
.mini-lb-row{ display:flex; align-items:center; gap:12px; padding:9px 10px; border-radius:10px; }
.mini-lb-row.is-me{ background:color-mix(in oklch, var(--accent) 12%, transparent); }
.mini-lb-rank{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; width:18px; color:var(--text-mute); font-size:14px; }
.mini-lb-name{ font-weight:600; font-size:14.5px; flex:1; }
.mini-lb-score{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-size:13px; color:var(--text-dim); }
.streak-big{ display:flex; align-items:baseline; gap:8px; margin:14px 0 16px; }
.streak-flame-big{ font-size:26px; }
.streak-big b{ font-family:var(--font-display); font-size:40px; line-height:1; }
.streak-big span{ font-size:13px; color:var(--text-mute); }
.streak-week{ display:flex; gap:7px; }
.streak-day{ flex:1; aspect-ratio:1; border-radius:9px; background:var(--bg-2); border:1px solid var(--line-soft); display:flex; align-items:center; justify-content:center; font-size:12px; color:var(--text-mute); font-weight:600; }
.streak-day.on{ background:color-mix(in oklch, var(--accent) 22%, var(--card-2)); color:var(--text); border-color:color-mix(in oklch, var(--accent) 40%, transparent); }
.streak-day.today{ box-shadow:0 0 0 2px var(--accent); }
.streak-note{ font-size:12.5px; color:var(--text-mute); margin-top:14px; }

/* ---------- game page ---------- */
.game-page{ padding-top:28px; padding-bottom:60px; }
.game-top{ display:flex; align-items:center; gap:20px; padding-bottom:22px; border-bottom:1px solid var(--line-soft); margin-bottom:26px; }
.back-link{ background:none; border:none; color:var(--text-dim); font-size:14px; font-weight:500; padding:6px 0; }
.back-link:hover{ color:var(--text); }
.game-top-mid{ display:flex; align-items:center; gap:12px; margin-left:8px; }
.game-top-name{ font-family:var(--font-display); font-size:19px; font-weight:700; }
.game-top-sub{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-size:12.5px; color:var(--text-mute); }
.game-top-right{ margin-left:auto; display:flex; align-items:center; gap:14px; }
.game-counter{ font-size:14px; color:var(--text-dim); }
.game-counter b{ font-family:var(--font-num); font-variant-numeric:tabular-nums; color:var(--text); }
.game-body{ display:grid; grid-template-columns:1fr 300px; gap:26px; align-items:start; }
.game-help{ font-size:15px; color:var(--text-dim); margin-bottom:18px; max-width:58ch; }
.game-help b{ color:var(--text); }
.guess-form{ display:flex; gap:10px; margin-bottom:8px; }
.guess-input{ flex:1; background:var(--card); border:1.5px solid var(--line); border-radius:99px; padding:14px 22px; font-size:17px; color:var(--text); font-family:var(--font-body); outline:none; transition:.15s; }
.guess-input:focus{ border-color:var(--g); box-shadow:0 0 0 4px color-mix(in oklch, var(--g) 16%, transparent); }
.guess-input::placeholder{ color:var(--text-mute); }
.guess-error{ color:oklch(0.72 0.16 30); font-size:13.5px; margin:8px 2px; }
.last-guess{ margin:18px 0 8px; }
.last-guess-label{ font-family:var(--font-body); font-weight:700; font-size:11.5px; letter-spacing:.03em; text-transform:uppercase; color:var(--text-mute); margin-bottom:6px; }
.heat-legend{ display:flex; align-items:center; gap:10px; margin:22px 0 12px; font-family:var(--font-num); font-variant-numeric:tabular-nums; font-size:11px; color:var(--text-mute); }
.heat-legend-bar{ flex:1; height:7px; border-radius:99px; }

/* guess list */
.guess-list,.last-guess{ list-style:none; }
.guess-list{ display:flex; flex-direction:column; gap:5px; }
.g-row{ display:grid; grid-template-columns:30px minmax(90px,1.1fr) 2.4fr 56px 96px; align-items:center; gap:12px; padding:11px 14px; background:var(--card); border:1px solid var(--line-soft); border-radius:11px; transition:background .3s; }
.g-row-new{ background:color-mix(in oklch, var(--g) 14%, var(--card)); border-color:color-mix(in oklch, var(--g) 36%, transparent); animation:rowin .35s ease; }
@keyframes rowin{ from{ transform:translateY(-4px); opacity:.4; } to{ transform:none; opacity:1; } }
.g-row-win{ background:color-mix(in oklch, oklch(0.74 0.16 150) 18%, var(--card)); border-color:oklch(0.7 0.16 150); }
.last-guess .g-row{ border-width:1.5px; }
.g-rank{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-size:13px; color:var(--text-mute); }
.g-word{ font-weight:600; font-size:15.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.g-bar-wrap{ height:10px; background:var(--bg-2); border-radius:99px; overflow:hidden; }
.g-bar{ display:block; height:100%; border-radius:99px; transition:width .4s ease; }
.g-score{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; font-size:14px; text-align:right; }
.g-tier{ display:flex; align-items:center; gap:6px; font-size:12.5px; color:var(--text-dim); justify-self:end; }
.g-emoji{ font-size:14px; }
.empty-guesses{ text-align:center; padding:46px 20px; color:var(--text-mute); }
.empty-thermo{ font-size:38px; margin-bottom:12px; opacity:.6; }
.empty-guesses p{ max-width:34ch; margin:0 auto; font-size:14.5px; }

/* aside */
.game-aside{ display:flex; flex-direction:column; gap:16px; position:sticky; top:92px; }
.aside-card{ background:var(--card); border:1px solid var(--line-soft); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow-soft); }
.aside-stat{ display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px; }
.aside-stat-label{ font-size:13px; color:var(--text-mute); }
.aside-stat-val{ font-family:var(--font-num); font-variant-numeric:tabular-nums; font-weight:700; font-size:24px; }
.aside-thermo-track{ position:relative; height:12px; border-radius:99px; }
.aside-thermo-marker{ position:absolute; top:50%; width:14px; height:14px; border-radius:50%; background:#fff; transform:translate(-50%,-50%); box-shadow:0 0 0 3px var(--card), 0 1px 4px oklch(0.5 0.03 60 / .35); transition:left .4s ease; }
.aside-tier{ text-align:center; margin-top:12px; font-size:14px; font-weight:600; }
.aside-mini-head{ font-family:var(--font-display); font-weight:700; font-size:15px; margin-bottom:12px; }
.aside-steps{ list-style:none; display:flex; flex-direction:column; gap:13px; font-size:13px; color:var(--text-dim); }
.aside-steps li{ display:flex; align-items:flex-start; gap:9px; line-height:1.3; }
.aside-steps .dot{ width:11px; height:11px; border-radius:50%; flex-shrink:0; margin-top:3px; }
.aside-hint p{ font-size:13.5px; color:var(--text-dim); }

/* win panel */
.win-panel{ text-align:center; background:linear-gradient(180deg, color-mix(in oklch, oklch(0.74 0.16 150) 10%, var(--card)), var(--card)); border:1px solid color-mix(in oklch, oklch(0.74 0.16 150) 30%, var(--line)); border-radius:calc(var(--radius)+6px); padding:34px 28px; margin-bottom:8px; }
.win-burst{ font-size:46px; }
.win-title{ font-family:var(--font-display); font-size:28px; font-weight:700; margin:6px 0 8px; }
.win-sub{ color:var(--text-dim); font-size:15px; max-width:42ch; margin:0 auto; }
.win-sub b{ color:var(--text); }
.win-stats{ display:flex; justify-content:center; gap:14px; margin:24px 0; }
.win-stat{ background:var(--bg-2); border:1px solid var(--line-soft); border-radius:var(--radius); padding:14px 22px; min-width:96px; }
.win-stat b{ font-family:var(--font-display); font-size:30px; display:block; font-variant-numeric:tabular-nums; }
.win-stat span{ font-size:12.5px; color:var(--text-mute); }
.win-cta{ display:flex; gap:12px; justify-content:center; }
.win-foot{ font-size:13px; color:var(--text-mute); margin-top:18px; }
.win-foot b{ color:var(--text-dim); font-family:var(--font-num); font-variant-numeric:tabular-nums; }

/* ---------- leaderboard ---------- */
.lb-page{ padding-top:34px; padding-bottom:80px; }
.lb-hero{ margin-bottom:26px; }
.lb-title{ font-family:var(--font-display); font-size:42px; font-weight:700; letter-spacing:-0.03em; margin:8px 0 8px; }
.lb-sub{ color:var(--text-dim); font-size:16px; }
.lb-controls{ display:flex; justify-content:space-between; align-items:center; gap:18px; flex-wrap:wrap; margin-bottom:30px; }
.game-tabs{ display:flex; gap:8px; flex-wrap:wrap; }
.game-tab{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line-soft); border-radius:99px; padding:9px 16px; font-size:14.5px; font-weight:600; color:var(--text-dim); transition:.15s; }
.game-tab:hover{ color:var(--text); }
.game-tab.active{ color:var(--text); border-color:var(--g); background:color-mix(in oklch, var(--g) 14%, var(--card)); box-shadow:0 0 0 1px var(--g); }
.game-tab-glyph{ font-size:16px; }
.lb-control-right{ display:flex; gap:12px; align-items:center; }
.seg{ display:flex; background:var(--bg-2); border:1px solid var(--line-soft); border-radius:99px; padding:3px; }
.seg-btn{ background:none; border:none; padding:8px 16px; border-radius:99px; font-size:13.5px; font-weight:600; color:var(--text-mute); transition:.15s; }
.seg-btn.active{ background:var(--card-2); color:var(--text); }
.friends-toggle{ display:flex; align-items:center; gap:8px; background:var(--card); border:1px solid var(--line-soft); border-radius:99px; padding:9px 15px; font-size:13.5px; font-weight:600; color:var(--text-dim); }
.friends-toggle .ft-dot{ width:9px; height:9px; border-radius:50%; background:var(--text-mute); transition:.15s; }
.friends-toggle.on{ color:var(--text); border-color:var(--accent); }
.friends-toggle.on .ft-dot{ background:var(--accent); }

/* podium */
.podium{ display:flex; justify-content:center; align-items:flex-end; gap:22px; margin-bottom:34px; padding:10px 0; }
.podium-col{ display:flex; flex-direction:column; align-items:center; gap:8px; width:150px; }
.podium-medal{ font-size:24px; }
.podium-name{ font-family:var(--font-display); font-weight:700; font-size:15px; }
.podium-col.is-me .podium-name{ color:var(--accent); }
.podium-bar{ width:100%; background:linear-gradient(180deg, var(--card-2), var(--card)); border:1px solid var(--line); border-bottom:none; border-radius:12px 12px 0 0; display:flex; align-items:flex-start; justify-content:center; padding-top:12px; }
.podium-1 .podium-bar{ background:linear-gradient(180deg, color-mix(in oklch, var(--g) 28%, var(--card-2)), var(--card)); border-color:var(--g); }

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {

  étoile: 78, astre: 76, lune: 72, lumière: 70, ciel: 67,
  rayon: 66, planète: 64, chaleur: 63, briller: 61, terre: 60,

  aube: 48, crépuscule: 47, horizon: 46, midi: 45, nuage: 44,
  feu: 43, bronzer: 42, plage: 41, brûler: 40, galaxie: 39,
  espace: 38, univers: 37, système: 36, saison: 35, printemps: 34,
  matin: 33, soir: 32, nuit: 31, mer: 29, vacances: 28,
  sable: 27, lumineux: 30, météo: 26, vent: 22, ciels: 25,
  pluie: 20, hiver: 18, neige: 14, froid: 12, glace: 10,

};

function normalizeWord(w) {
  return (w || "")
    .toLowerCase()
    .trim()
    .normalize("NFD")
    .replace(/[̀-ͯ]/g, "")
    .replace(/[^a-z]/g, "");
}

const NORM_PROX = {};
Object.keys(PROXIMITY).forEach((k) => {
  NORM_PROX[normalizeWord(k)] = { display: k, score: PROXIMITY[k] };
});

function coldHash(norm) {
  let h = 0;
  for (let i = 0; i < norm.length; i++) h = (h * 31 + norm.charCodeAt(i)) >>> 0;
  return -2 + (h % 900) / 100;
}

function scoreGuess(raw) {
  const norm = normalizeWord(raw);
  if (!norm) return null;
  const hit = NORM_PROX[norm];
  if (hit) return { display: hit.display, score: hit.score, known: true, norm };
  return {
    display: raw.toLowerCase().trim(),
    score: Math.round(coldHash(norm) * 10) / 10,
    known: false,
    norm,
  };
}

function tierFor(score) {
  if (score >= 100) return { label: "TROUVÉ", emoji: "🎉", t: 1 };
  if (score >= 60) return { label: "Brûlant", emoji: "🔥", t: 0.92 };
  if (score >= 45) return { label: "Très chaud", emoji: "🥵", t: 0.78 };
  if (score >= 30) return { label: "Chaud", emoji: "😎", t: 0.6 };
  if (score >= 18) return { label: "Tiède", emoji: "🙂", t: 0.42 };
  if (score >= 8) return { label: "Frais", emoji: "😐", t: 0.28 };
  if (score >= 1) return { label: "Froid", emoji: "🥶", t: 0.14 };
  return { label: "Glacial", emoji: "🧊", t: 0.05 };
}

function mk(id, name, color, friend) {
  const initials = name.split(/\s+/).map((s) => s[0]).join("").slice(0, 2).toUpperCase();
  return { id, name, initials, color, friend };

];

function seededRows(gameId, scope) {
  const base = gameId.split("").reduce((a, c) => a + c.charCodeAt(0), 0);
  const salt = scope === "all" ? 7 : 1;
  return USERS.map((u, i) => {
    const seed = (base + i * 13 + salt * 5) % 97;
    const tries = 6 + (seed % 70);
    const seconds = 120 + (seed * 7) % 900;
    const streak = scope === "all" ? 4 + (seed % 60) : (seed % 12);
    const plays = scope === "all" ? 40 + (seed % 220) : 1;
    const winRate = 70 + (seed % 30);
    return { user: u, tries, seconds, streak, plays, winRate };
  });
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return `${m}:${String(sec).padStart(2, "0")}`;
}

function leaderboard(gameId, scope, friendsOnly) {
  let rows = seededRows(gameId, scope);
  if (friendsOnly) rows = rows.filter((r) => r.user.friend);
  if (scope === "all") {
    rows.sort((a, b) => b.streak - a.streak || b.winRate - a.winRate);
  } else {
    rows.sort((a, b) => a.tries - b.tries || a.seconds - b.seconds);
  }
  return rows.map((r, i) => ({ ...r, rank: i + 1 }));
}

function tempColor(score) {
  const t = Math.max(0, Math.min(100, score)) / 100;
  const hue = 250 - t * 222;
  const chroma = 0.13 + t * 0.09;
  const light = 0.7 - t * 0.06;
  return `oklch(${light} ${chroma} ${hue})`;
}

function Semantik({ go, state, setState }) {
  const game = GAMES[0];
  const [value, setValue] = React.useState("");
  const [guesses, setGuesses] = React.useState(() => (state && state.guesses) || []);
  const [last, setLast] = React.useState(null);
  const [error, setError] = React.useState("");
  const [copied, setCopied] = React.useState(false);
  const [revealed, setRevealed] = React.useState((state && state.won) || false);
  const inputRef = React.useRef(null);

  const won = guesses.some((g) => g.score >= 100);

  React.useEffect(() => { inputRef.current && inputRef.current.focus(); }, []);

  React.useEffect(() => {
    const tries = guesses.length;
    setState({ guesses, won, tries });
  }, [guesses]);

  function submit(e) {
    e && e.preventDefault();
    const res = scoreGuess(value);
    setError("");
    if (!res) return;
    const existing = guesses.find((g) => g.norm === res.norm);
    if (existing) {
      setError(`« ${existing.display} » a déjà été proposé`);
      setLast(existing.id);
      setValue("");
      return;
    }
    const entry = { ...res, id: Date.now() + Math.random(), order: guesses.length + 1 };
    const next = [...guesses, entry];
    setGuesses(next);
    setLast(entry.id);
    setValue("");
    if (entry.score >= 100) setRevealed(true);
  }

  function giveUp() {
    if (won) return;
    const entry = { display: SECRET_WORD, score: 100, known: true, norm: normalizeWord(SECRET_WORD), id: Date.now(), order: guesses.length + 1, gaveUp: true };
    setGuesses([...guesses, entry]);
    setRevealed(true);
  }

  function share() {
    const t = guesses.length;
    navigator.clipboard && navigator.clipboard.writeText(
      `MikizGame · Sémantik n°${PUZZLE_NO}\nTrouvé en ${t} essais 🌡️\nmikizgame.app`
    );
    setCopied(true);
    setTimeout(() => setCopied(false), 1800);
  }

  const sorted = [...guesses].sort((a, b) => b.score - a.score);
  const lastEntry = guesses.length ? guesses[guesses.length - 1] : null;
  const best = sorted.length ? sorted[0].score : 0;

  return (
    <div className="page game-page" style={{ "--g": game.accent }}>
      <div className="game-top">
        <button className="back-link" onClick={() => go("home")}>← Tous les jeux</button>
        <div className="game-top-mid">
          <GameGlyph game={game} size={40} />
          <div>
            <div className="game-top-name">{game.name}</div>
            <div className="game-top-sub">n°{PUZZLE_NO} · {TODAY_LABEL}</div>
          </div>
        </div>
        <div className="game-top-right">
          <span className="game-counter"><b>{guesses.length}</b> essais</span>
          {!won && <Button variant="ghost" size="sm" onClick={giveUp}>Abandonner</Button>}
        </div>
      </div>

      <div className="game-body">
        <div className="game-main">
          {!won && (
            <p className="game-help">
              Devine le mot secret du jour. Pour chaque mot proposé, tu obtiens une
              <b> température</b> : plus elle est élevée, plus ton mot est <b>proche du sens</b> recherché.
            </p>
          )}

          {revealed ? (
            <WinPanel tries={guesses.filter(g=>!g.gaveUp).length} onShare={share} copied={copied} go={go} />
          ) : (
            <form className="guess-form" onSubmit={submit}>
              <input
                ref={inputRef}
                className="guess-input"
                placeholder="Tape un mot…"
                value={value}
                onChange={(e) => setValue(e.target.value)}
                autoComplete="off"
                spellCheck="false"
              />
              <Button accent={game.accent} size="lg" disabled={!value.trim()}>Proposer</Button>
            </form>
          )}
          {error && <div className="guess-error">{error}</div>}

          {lastEntry && !revealed && (
            <div className="last-guess">
              <div className="last-guess-label">Dernier essai</div>
              <GuessRow g={lastEntry} highlight />
            </div>
          )}

          <div className="heat-legend">
            <span>0°</span>
            <span className="heat-legend-bar" style={{ background: HEAT_GRAD }} />
            <span>100°</span>
          </div>

          {guesses.length === 0 ? (
            <div className="empty-guesses">
              <div className="empty-thermo">🌡️</div>
              <p>Aucun essai pour l'instant. Lance-toi — un mot du quotidien fait souvent un bon départ.</p>
            </div>
          ) : (
            <ol className="guess-list">
              {sorted.map((g) => (
                <GuessRow key={g.id} g={g} highlight={g.id === last} />
              ))}
            </ol>
          )}
        </div>

        <aside className="game-aside">
          <div className="aside-card">
            <div className="aside-stat">
              <span className="aside-stat-label">Au plus chaud</span>
              <span className="aside-stat-val" style={{ color: tempColor(best) }}>{best.toFixed(1)}°</span>
            </div>
            <div className="aside-thermo">
              <div className="aside-thermo-track" style={{ background: HEAT_GRAD }}>
                <div className="aside-thermo-marker" style={{ left: Math.max(2, Math.min(98, best)) + "%" }} />
              </div>
            </div>
            <div className="aside-tier">{tierFor(best).emoji} {tierFor(best).label}</div>
          </div>

          <div className="aside-card">
            <div className="aside-mini-head">Comment ça marche</div>
            <ul className="aside-steps">
              <li><span className="dot" style={{background:tempColor(8)}} /> <span><b>0–18°</b> — loin du sens</span></li>
              <li><span className="dot" style={{background:tempColor(30)}} /> <span><b>18–45°</b> — tu te rapproches</span></li>
              <li><span className="dot" style={{background:tempColor(70)}} /> <span><b>45–99°</b> — brûlant, presque !</span></li>
              <li><span className="dot" style={{background:tempColor(100)}} /> <span><b>100°</b> — le mot exact</span></li>
            </ul>
          </div>

          <div className="aside-card aside-hint">
            <div className="aside-mini-head">Besoin d'un coup de pouce ?</div>
            <p>Le mot du jour est lié à la lumière et à la chaleur. ☀️</p>
          </div>
        </aside>
      </div>
    </div>
  );
}

// ─── leaderboard ─────────────────────────────────────────────────────────────

function Podium({ rows }) {
  const top3 = rows.slice(0, 3);
  const order = [top3[1], top3[0], top3[2]].filter(Boolean);
  return (
    <div className="podium">
      {order.map((r) => {
        const place = r.rank;
        return (
          <div key={r.user.id} className={"podium-col podium-" + place + (r.user.id === "me" ? " is-me" : "")}>
            <div className="podium-medal">{place === 1 ? "🥇" : place === 2 ? "🥈" : "🥉"}</div>
            <Avatar user={r.user} size={place === 1 ? 64 : 52} ring />
            <div className="podium-name">{r.user.name}{r.user.id === "me" && " (toi)"}</div>
            <div className="podium-bar" style={{ height: place === 1 ? 104 : place === 2 ? 78 : 58 }}>
              <span className="podium-rank">{place}</span>
            </div>
          </div>
        );
      })}
    </div>
  );
}

function Leaderboard({ go, initialGame }) {
  const liveGames = GAMES.filter((g) => g.status === "live");
  const [gameId, setGameId] = React.useState(initialGame && liveGames.find(g=>g.id===initialGame) ? initialGame : "semantik");
  const [scope, setScope] = React.useState("daily");
  const [friends, setFriends] = React.useState(false);

  const game = GAMES.find((g) => g.id === gameId);
  const rows = leaderboard(gameId, scope, friends);
  const meRow = rows.find((r) => r.user.id === "me");

  return (
    <div className="page lb-page" style={{ "--g": game.accent }}>
      <div className="lb-hero">
        <div className="section-kicker">Classement</div>
        <h1 className="lb-title">Qui domine aujourd'hui ?</h1>
        <p className="lb-sub">Compare tes scores par jeu, en quotidien ou sur tous les temps.</p>
      </div>

      <div className="lb-controls">
        <div className="game-tabs">
          {liveGames.map((g) => (
            <button
              key={g.id}
              className={"game-tab" + (g.id === gameId ? " active" : "")}
              style={{ "--g": g.accent }}
              onClick={() => setGameId(g.id)}
            >
              <span className="game-tab-glyph">{g.glyph}</span>
              {g.name}
            </button>
          ))}
        </div>
        <div className="lb-control-right">
          <div className="seg">
            <button className={"seg-btn" + (scope === "daily" ? " active" : "")} onClick={() => setScope("daily")}>Quotidien</button>
            <button className={"seg-btn" + (scope === "all" ? " active" : "")} onClick={() => setScope("all")}>Tous les temps</button>
          </div>
          <button className={"friends-toggle" + (friends ? " on" : "")} onClick={() => setFriends(!friends)}>
            <span className="ft-dot" /> Amis seulement
          </button>
        </div>
      </div>

      {rows.length >= 3 && <Podium rows={rows} />}

      <div className="lb-table">
        <div className="lb-head-row">
          <span>#</span>
          <span>Joueur</span>
          {scope === "daily" ? (
            <React.Fragment>
              <span className="ta-r">Essais</span>
              <span className="ta-r">Temps</span>
              <span className="ta-r">Série</span>
            </React.Fragment>
          ) : (
            <React.Fragment>
              <span className="ta-r">Série</span>
              <span className="ta-r">Victoires</span>
              <span className="ta-r">Parties</span>
            </React.Fragment>
          )}
        </div>
        {rows.map((r) => (
          <div key={r.user.id} className={"lb-row" + (r.user.id === "me" ? " is-me" : "")}>
            <span className={"lb-rank" + (r.rank <= 3 ? " top" : "")}>{r.rank}</span>
            <span className="lb-player">
              <Avatar user={r.user} size={34} />
              <span className="lb-player-name">{r.user.name}{r.user.id === "me" && <span className="you-tag">toi</span>}</span>
              {r.user.friend && r.user.id !== "me" && <span className="friend-tag">ami</span>}
            </span>
            {scope === "daily" ? (
              <React.Fragment>
                <span className="ta-r mono"><b>{r.tries}</b></span>
                <span className="ta-r mono">{fmtTime(r.seconds)}</span>
                <span className="ta-r"><span className="mini-flame">🔥</span>{r.streak}</span>
              </React.Fragment>
            ) : (
              <React.Fragment>
                <span className="ta-r"><span className="mini-flame">🔥</span><b>{r.streak}</b></span>
                <span className="ta-r mono">{r.winRate}%</span>
                <span className="ta-r mono">{r.plays}</span>
              </React.Fragment>
            )}
          </div>
        ))}
      </div>

      {meRow && (
        <div className="lb-sticky-me">
          <span className="lb-rank top">{meRow.rank}</span>
          <span className="lb-player">
            <Avatar user={ME} size={32} />
            <span className="lb-player-name">Toi</span>
          </span>
          <span className="lb-me-note">
            {scope === "daily"
              ? `${meRow.tries} essais · ${fmtTime(meRow.seconds)}`
              : `série de ${meRow.streak} · ${meRow.winRate}% de victoires`}
          </span>
          <Button accent={game.accent} size="sm" onClick={() => go(gameId === "semantik" ? "semantik" : "home")}>
            {gameId === "semantik" ? "Rejouer" : "Ouvrir"}
          </Button>
        </div>
      )}
    </div>
  );
}

// ─── app ─────────────────────────────────────────────────────────────────────

const LS_KEY = "mikizgame.v1";
function loadState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; } catch (e) { return {}; }
}
function saveState(s) {
  try { localStorage.setItem(LS_KEY, JSON.stringify(s)); } catch (e) {}
}

const TWEAK_DEFAULTS = {
  "accent": "oklch(0.70 0.17 45)",
  "display": "Baloo 2",
  "corners": "rounded"
};

function ComingSoon({ go, gameId }) {
  const game = GAMES.find((g) => g.id === gameId);
  return (
    <div className="page coming-soon" style={{ "--g": game.accent }}>
      <GameGlyph game={game} size={72} />
      <h1>{game.name}</h1>
      <p>{game.blurb}</p>
      <Button accent={game.accent} onClick={() => go("home")}>← Retour aux jeux</Button>
    </div>
  );
}

function App() {
  const persisted = loadState();
  const [route, setRoute] = React.useState(persisted.route || "home");
  const [semantikState, setSemantikState] = React.useState(persisted.semantik || { guesses: [], won: false, tries: 0 });
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  function go(r) { setRoute(r); window.scrollTo({ top: 0 }); }

  React.useEffect(() => { saveState({ ...loadState(), route, semantik: semantikState }); }, [route, semantikState]);

  React.useEffect(() => {
    const r = document.documentElement;
    r.style.setProperty("--accent", t.accent);
    r.style.setProperty("--font-display", `"${t.display}", "Baloo 2", sans-serif`);
    r.style.setProperty("--radius", t.corners === "sharp" ? "5px" : t.corners === "round" ? "22px" : "14px");
  }, [t]);

  const streak = 7;

  return (
    <div className="app-root">
      <Header route={route} go={go} streak={streak} />
      <main className="app-main">
        {route === "home" && <Home go={go} semantikState={semantikState} />}
        {route === "semantik" && (
          <Semantik
            go={go}
            state={semantikState}
            setState={(s) => setSemantikState(s)}
          />
        )}
        {route === "leaderboard" && <Leaderboard go={go} initialGame="semantik" />}
        {(route === "lexio" || route === "cinedle") && <ComingSoon go={go} gameId={route} />}
      </main>
      <footer className="app-footer">
        <Logo onClick={() => go("home")} />
        <span className="foot-note">Fait maison · un jeu chaque jour à minuit · © 2026 MikizGame</span>
        <div className="foot-links">
          <button onClick={() => go("home")}>Accueil</button>
          <button onClick={() => go("leaderboard")}>Classement</button>
        </div>
      </footer>

      <TweaksPanel>
        <TweakSection label="Couleur d'accent" />
        <TweakColor
          label="Accent du hub"
          value={t.accent}
          options={[
            "oklch(0.70 0.17 45)",
            "oklch(0.70 0.15 152)",
            "oklch(0.66 0.16 292)",
            "oklch(0.66 0.15 232)",
            "oklch(0.68 0.18 20)",
          ]}
          onChange={(v) => setTweak("accent", v)}
        />
        <TweakSection label="Typographie" />
        <TweakSelect
          label="Police titres"
          value={t.display}
          options={["Baloo 2", "Quicksand", "Nunito", "Bricolage Grotesque"]}
          onChange={(v) => setTweak("display", v)}
        />
        <TweakSection label="Forme" />
        <TweakRadio
          label="Coins"
          value={t.corners}
          options={["sharp", "rounded", "round"]}
          onChange={(v) => setTweak("corners", v)}
        />
        <TweakButton label="Effacer ma progression" onClick={() => { localStorage.removeItem(LS_KEY); location.reload(); }} />
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
